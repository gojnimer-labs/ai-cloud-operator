apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-cloud-operator.fullname" . }}-controller-manager
  labels:
    control-plane: controller-manager
  {{- include "ai-cloud-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-cloud-operator
      control-plane: controller-manager
    {{- include "ai-cloud-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-cloud-operator
        control-plane: controller-manager
      {{- include "ai-cloud-operator.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
        # Deployment-shaped env values (CONVEX_BASE_URL/OPERATOR_NAME/
        # OPERATOR_EXTERNAL_URL) only take effect on process start. This
        # checksum forces a rollout on `helm upgrade` whenever the
        # chart-owned params ConfigMap actually changes, the same job
        # kustomize's configMapGenerator hash-suffix trick did.
        # ENROLLMENT_SECRET needs no equivalent here — it's mounted as a
        # volume (see the enrollment-secret volumeMount below), which
        # kubelet keeps refreshing live, so a content change never needs a
        # rollout to take effect.
        checksum/params: {{ include (print $.Template.BasePath "/params.yaml") . | sha256sum }}
    spec:
      containers:
      - args: {{- toYaml .Values.controllerManager.manager.args | nindent 8 }}
        command:
        - /manager
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: API_LISTEN_ADDR
          value: {{ quote .Values.controllerManager.manager.env.apiListenAddr }}
        - name: CONVEX_BASE_URL
          valueFrom:
            configMapKeyRef:
              key: CONVEX_BASE_URL
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        - name: OPERATOR_NAME
          valueFrom:
            configMapKeyRef:
              key: OPERATOR_NAME
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        - name: OPERATOR_EXTERNAL_URL
          valueFrom:
            configMapKeyRef:
              key: OPERATOR_EXTERNAL_URL
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        - name: WORKLOAD_NAMESPACE
          valueFrom:
            configMapKeyRef:
              key: WORKLOAD_NAMESPACE
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        # HEARTBEAT_INTERVAL/METRICS_REPORT_INTERVAL: previously missing here
        # even though the params ConfigMap (templates/params.yaml) always
        # had HEARTBEAT_INTERVAL — a Helm-deployed operator silently fell
        # back to the Go binary's own hardcoded default instead of whatever
        # params.heartbeatInterval said, unnoticed only because they happen
        # to match. Wiring both explicitly now.
        - name: HEARTBEAT_INTERVAL
          valueFrom:
            configMapKeyRef:
              key: HEARTBEAT_INTERVAL
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        - name: METRICS_REPORT_INTERVAL
          valueFrom:
            configMapKeyRef:
              key: METRICS_REPORT_INTERVAL
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        {{- if .Values.params.operatorTags }}
        # Plain value, not configMapKeyRef — .Values.params.operatorTags
        # isn't one of the params ConfigMap's keys (see values-overlay.yaml's
        # comment on why). Omitted entirely when unset, matching the
        # kustomize install's `optional: true` behavior for this same var
        # (see config/manager/manager.yaml) — see cmd/main.go's
        # os.LookupEnv-based "unset vs explicitly empty" distinction.
        - name: OPERATOR_TAGS
          value: {{ .Values.params.operatorTags | quote }}
        {{- end }}
        # Sourced directly from the chart's own AppVersion, not a values.yaml
        # field — this is the Helm chart's actual release version, so there's
        # nothing for an installer to configure here (unlike the kustomize
        # install, which has no equivalent version concept and leaves
        # OPERATOR_VERSION unset by default — see config/manager/params.env).
        - name: OPERATOR_VERSION
          value: {{ .Chart.AppVersion | quote }}
        # GATEWAY_SIGNING_SECRET is deliberately absent — the operator
        # generates and persists its own on first boot instead of asking
        # this chart to mint and hand it one (see internal/gateway.KeyStore
        # and docs/production-deploy.md).
        image: {{ .Values.controllerManager.manager.image.repository }}:{{ .Values.controllerManager.manager.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.controllerManager.manager.imagePullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 9443
          name: operator-api
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.controllerManager.manager.resources | nindent 10
          }}
        securityContext: {{- toYaml .Values.controllerManager.manager.containerSecurityContext
          | nindent 10 }}
        volumeMounts:
        # /etc/ai-cloud-operator/enrollment/ENROLLMENT_SECRET —
        # convexclient.EnrollmentSecretPath. No subPath, so kubelet keeps
        # refreshing this file's content whenever the backing Secret
        # changes.
        - name: enrollment-secret
          mountPath: /etc/ai-cloud-operator/enrollment
          readOnly: true
      nodeSelector: {{- toYaml .Values.controllerManager.nodeSelector | nindent 8 }}
      securityContext: {{- toYaml .Values.controllerManager.podSecurityContext | nindent
        8 }}
      serviceAccountName: {{ include "ai-cloud-operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      tolerations: {{- toYaml .Values.controllerManager.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.controllerManager.topologySpreadConstraints
        | nindent 8 }}
      volumes:
      - name: enrollment-secret
        secret:
          {{- if .Values.enrollmentSecret.existingSecretName }}
          secretName: {{ .Values.enrollmentSecret.existingSecretName }}
          # existingSecretKey lets an existing Secret use any key name for
          # the token — remapped here to the fixed filename
          # convexclient.EnrollmentSecretPath reads, since a volume mount
          # otherwise names each file after its Secret key.
          items:
          - key: {{ .Values.enrollmentSecret.existingSecretKey }}
            path: ENROLLMENT_SECRET
          {{- else }}
          secretName: {{ include "ai-cloud-operator.fullname" . }}-enrollment-secret
          {{- end }}
