# Merged on top of whatever hack/render-helm-chart.sh's helmify run just
# (re)generated into charts/ai-cloud-operator/values.yaml — see that
# script's comments for why this can't just be a one-time hand-edit.
controllerManager:
  manager:
    image:
      repository: ghcr.io/gojnimer-labs/ai-cloud-operator
      # Empty on purpose — templates/deployment.yaml falls back to
      # .Chart.AppVersion, and .github/workflows/helm-release.yml packages
      # each release with --app-version set to the same tag it publishes
      # the image under, so the two stay in sync without extra plumbing.
      # Only set this to pin an instance to an older image than the chart
      # version it's running.
      tag: ""
  # helmify's PodDisruptionBudget template (templates/controller-manager.yaml)
  # unconditionally references .Values.controllerManager.minAvailable even
  # though config/manager/poddisruptionbudget.yaml only sets maxUnavailable —
  # helmify only adds a values.yaml key for fields actually set on the
  # source object (see its pdb.go processor), so without this the key is
  # entirely absent and Helm's default `missingkey=invalid` template option
  # renders the reference as the literal string "<no value>", which fails
  # Kubernetes API validation. Explicitly null here is equivalent to the
  # field being unset (same as omitting it) and keeps the key present so
  # the template renders cleanly.
  minAvailable: null

# ENROLLMENT_SECRET must be set for the operator to register with Convex
# (see docs/production-deploy.md) but this chart never wants to be the
# thing holding it in cleartext in your Git repo. Two ways to provide it —
# either way it's mounted into the pod as a volume, not an env var (see
# templates/deployment.yaml's enrollment-secret volumeMount), so
# existingSecretName can point at any Secret you like, under any name:
enrollmentSecret:
  # Preferred: point at a Secret you already manage outside this chart
  # (SealedSecret, External Secrets Operator, manual kubectl apply — however
  # you already handle secrets with ArgoCD). Takes precedence over `value`
  # below whenever set.
  existingSecretName: ""
  existingSecretKey: ENROLLMENT_SECRET
  # Fallback for a quick/test install: the chart templates this straight
  # into a Secret itself. Only used when existingSecretName is empty —
  # don't commit a real value here to git.
  value: ""

# Optional — mirrors config/ingress/ingress.yaml, which is an opt-in
# kustomize overlay for the same reason: most instances front this with
# whatever ingress/gateway setup the cluster already has, not a
# chart-specific one.
ingress:
  enabled: false
  className: traefik
  annotations: {}
  # Public hostname this operator will be reachable at — must match
  # OPERATOR_EXTERNAL_URL in .Values.controllerManager (params.operatorExternalUrl).
  host: ""
  tls:
    enabled: true
    # Defaults to "<release name>-api-tls" (see templates/ingress.yaml) when
    # left empty.
    secretName: ""
