apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: ai-cloud-operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: ai-cloud-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: ai-cloud-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: ai-cloud-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        name: manager
        env:
          # Downward API — the operator persists its Convex-issued token in a
          # Secret in its own namespace (see internal/tokenstore), so it must
          # know which namespace that is at runtime.
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          # Explicitly NOT :8443 (the default) — controller-runtime's own
          # metrics server is already bound to :8443 in this same container
          # (see manager_metrics_patch.yaml's --metrics-bind-address=:8443).
          # Leaving this unset would make the two servers race for the same
          # port and crash-loop one of them.
          - name: API_LISTEN_ADDR
            value: ":9443"
          - name: CONVEX_BASE_URL
            valueFrom:
              configMapKeyRef:
                name: params
                key: CONVEX_BASE_URL
          - name: OPERATOR_NAME
            valueFrom:
              configMapKeyRef:
                name: params
                key: OPERATOR_NAME
          - name: OPERATOR_EXTERNAL_URL
            valueFrom:
              configMapKeyRef:
                name: params
                key: OPERATOR_EXTERNAL_URL
          - name: WORKLOAD_NAMESPACE
            valueFrom:
              configMapKeyRef:
                name: params
                key: WORKLOAD_NAMESPACE
          - name: HEARTBEAT_INTERVAL
            valueFrom:
              configMapKeyRef:
                name: params
                key: HEARTBEAT_INTERVAL
          - name: METRICS_REPORT_INTERVAL
            valueFrom:
              configMapKeyRef:
                name: params
                key: METRICS_REPORT_INTERVAL
          # Both optional: true — the keys are commented out in params.env by
          # default (see its own doc comments), and `optional: true` is what
          # makes an absent ConfigMap key leave the env var unset entirely
          # rather than failing the container's startup, so cmd/main.go's
          # os.LookupEnv can tell "never configured" apart from "explicitly
          # set to empty."
          - name: OPERATOR_TAGS
            valueFrom:
              configMapKeyRef:
                name: params
                key: OPERATOR_TAGS
                optional: true
          - name: OPERATOR_VERSION
            valueFrom:
              configMapKeyRef:
                name: params
                key: OPERATOR_VERSION
                optional: true
          # GATEWAY_SIGNING_SECRET is intentionally absent here — it never
          # needs to be shared with anything outside this operator instance,
          # so the operator generates and persists it itself on first boot
          # (see internal/gateway.KeyStore) instead of asking a human to mint
          # one.
          #
          # ENROLLMENT_SECRET is deliberately NOT an env var — see the
          # enrollment-secret volumeMount below instead.
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 9443
          name: operator-api
          protocol: TCP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        # /etc/ai-cloud-operator/enrollment/ENROLLMENT_SECRET —
        # convexclient.EnrollmentSecretPath. No subPath, so kubelet keeps
        # refreshing this file's content whenever the backing Secret
        # changes, which is what lets checkEnrollmentSecret detect an
        # out-of-band rotation without a pod restart.
        - name: enrollment-secret
          mountPath: /etc/ai-cloud-operator/enrollment
          readOnly: true
      volumes:
      # Created out-of-band per cluster, never checked into git — see
      # docs/production-deploy.md. Not a kustomize-generated resource, so
      # this name is the literal final name kubectl must create it with (no
      # namePrefix rewriting applies to it). The operator never needs to
      # know this Secret's own object name — only this fixed mount path —
      # so, unlike an env var's secretKeyRef, this volume source is free to
      # point at any Secret without any Go code or RBAC change.
      - name: enrollment-secret
        secret:
          secretName: ai-cloud-operator-env
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
