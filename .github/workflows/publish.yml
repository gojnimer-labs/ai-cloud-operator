name: Publish

on:
  # No `branches: [main]` trigger here — auto-tag.yml fires on every main
  # push and calls this workflow via workflow_call below, so a direct
  # branch-push trigger here would double-build the image for the same
  # commit. `tags: v*` stays as a fallback for a direct `git push origin
  # vX.Y.Z` that bypasses auto-tag.yml entirely.
  push:
    tags:
      - "v*"
  # Lets auto-tag.yml invoke this directly with the tag it just pushed —
  # necessary because a tag pushed with the default GITHUB_TOKEN (as
  # auto-tag.yml's push is) does NOT trigger other workflows' `on: push:
  # tags` matchers. That's an intentional GitHub Actions anti-recursion
  # guard, not something fixable by changing the trigger syntax here.
  workflow_call:
    inputs:
      tag:
        description: "vX.Y.Z tag this build is for (set by auto-tag.yml). Leave unset for a plain branch build — produces latest+sha image tags only, no versioned tag and no install.yaml release asset."
        required: false
        type: string

permissions: {}

jobs:
  publish:
    permissions:
      contents: read
      packages: write
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Single source of truth for "what release is this build for", used
      # below by both the image tag list and (if non-empty) the release job.
      # Prefers the explicit workflow_call input; falls back to inspecting
      # the actual triggering ref for a direct `git push origin vX.Y.Z`
      # (bypassing auto-tag.yml entirely) or a plain branch push (empty).
      - name: Resolve version tag
        id: version
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Patches the builder stage's FROM to --platform=$BUILDPLATFORM (same
      # trick the Makefile's docker-buildx target uses) so the Go compiler
      # runs natively and just cross-compiles via GOARCH for each target —
      # no QEMU emulation of the actual build. Without this, buildx runs the
      # *entire* builder stage (compiling client-go/controller-runtime from
      # scratch) under full QEMU emulation for arm64, which is dramatically
      # slower and prone to hanging.
      - name: Generate cross-compilation Dockerfile
        run: |
          sed -e '1 s/\(^FROM\)/FROM --platform=${BUILDPLATFORM}/; t' -e ' 1,// s//FROM --platform=${BUILDPLATFORM}/' Dockerfile > Dockerfile.cross

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.cross
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

# First run only: the pushed package defaults to private even with a public
# repo. Go to https://github.com/orgs/gojnimer-labs/packages (or the repo's
# "Packages" sidebar) -> ai-cloud-operator -> Package settings, set
# visibility to Public and link it to this repository. GITHUB_TOKEN can't
# reliably change package visibility itself, so this one-time step isn't
# automated here.

  release:
    needs: publish
    if: needs.publish.outputs.tag != ''
    permissions:
      contents: write
    name: Attach consolidated install.yaml to the release
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      # A single YAML with CRDs + RBAC + Deployment (image already
      # substituted) — so a target machine only needs one `kubectl apply -f`
      # and never has to clone this repo. See docs/production-deploy.md.
      #
      # IMG uses needs.publish.outputs.version, NOT the tag verbatim — that
      # output is what the publish job actually pushed the image under
      # (leading "v" stripped), computed once in that job's "Resolve version
      # tag" step so both jobs can never disagree about it.
      - name: Build consolidated install manifest
        run: make build-installer IMG=ghcr.io/${{ github.repository }}:${{ needs.publish.outputs.version }}

      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.publish.outputs.tag }}" --generate-notes --title "${{ needs.publish.outputs.tag }}" || true
          gh release upload "${{ needs.publish.outputs.tag }}" dist/install.yaml --clobber
