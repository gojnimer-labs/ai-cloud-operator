name: Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions: {}

jobs:
  publish:
    permissions:
      contents: read
      packages: write
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Patches the builder stage's FROM to --platform=$BUILDPLATFORM (same
      # trick the Makefile's docker-buildx target uses) so the Go compiler
      # runs natively and just cross-compiles via GOARCH for each target —
      # no QEMU emulation of the actual build. Without this, buildx runs the
      # *entire* builder stage (compiling client-go/controller-runtime from
      # scratch) under full QEMU emulation for arm64, which is dramatically
      # slower and prone to hanging.
      - name: Generate cross-compilation Dockerfile
        run: |
          sed -e '1 s/\(^FROM\)/FROM --platform=${BUILDPLATFORM}/; t' -e ' 1,// s//FROM --platform=${BUILDPLATFORM}/' Dockerfile > Dockerfile.cross

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.cross
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

# First run only: the pushed package defaults to private even with a public
# repo. Go to https://github.com/orgs/gojnimer-labs/packages (or the repo's
# "Packages" sidebar) -> ai-cloud-operator -> Package settings, set
# visibility to Public and link it to this repository. GITHUB_TOKEN can't
# reliably change package visibility itself, so this one-time step isn't
# automated here.

  release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    name: Attach consolidated install.yaml to the release
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      # A single YAML with CRDs + RBAC + Deployment (image already
      # substituted) — so a target machine only needs one `kubectl apply -f`
      # and never has to clone this repo. See docs/production-deploy.md.
      #
      # IMG must match the tag docker/metadata-action actually pushed in the
      # publish job, NOT github.ref_name verbatim — its
      # `type=semver,pattern={{version}}` rule strips the leading "v" (e.g.
      # ref v0.1.0 -> pushed tag 0.1.0), so using ref_name directly here
      # would bake in a tag that was never published, causing
      # ImagePullBackOff on every deploy.
      - name: Build consolidated install manifest
        run: make build-installer IMG=ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}

      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}" || true
          gh release upload "${{ github.ref_name }}" dist/install.yaml --clobber
