name: Auto Tag

# Every merge to main gets its own vX.Y.Z release. This workflow computes
# and pushes that tag, then directly invokes publish.yml (image +
# install.yaml) and helm-release.yml (chart) via workflow_call, passing the
# new tag as an input — rather than relying on the tag push itself to
# trigger them. It can't rely on that: a tag pushed using the default
# GITHUB_TOKEN (as the "tag" job below does) does NOT trigger other
# workflows' `on: push: tags` matchers — an intentional GitHub Actions
# anti-recursion guard — so without this explicit composition, the tag
# would exist in git but never actually get released.
on:
  push:
    branches:
      - main

permissions: {}

jobs:
  tag:
    permissions:
      contents: write
    name: Push the next release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Deliberately NOT persist-credentials: false (unlike this repo's
          # other workflows) — this job's whole purpose is `git push` a tag,
          # which needs the checkout-configured GITHUB_TOKEN credential.

      # Simple vX.Y.(Z+1) patch bump off the highest existing v* tag; starts
      # at v0.1.0 if none exist yet. Assumes pushes to main land one at a
      # time (true for this repo's current single-committer workflow) — two
      # concurrent pushes computing the same "next" tag would have the
      # second push fail rather than silently double-tag; re-running the
      # workflow after the first lands resolves it.
      - name: Compute and push the next patch tag
        id: compute
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          latest="$(git tag -l 'v*' | sort -V | tail -1)"
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            base="${latest#v}"
            IFS=. read -r major minor patch <<< "$base"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Latest tag: ${latest:-<none>}; pushing $next"
          git tag -a "$next" -m "Auto-tagged release $next"
          git push origin "$next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

  publish:
    needs: tag
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit

  helm-release:
    needs: tag
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/helm-release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit
