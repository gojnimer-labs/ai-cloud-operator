name: Tests

on:
  # feature/** push gives fast feedback before a PR exists; pull_request
  # against development is what the development branch ruleset actually
  # requires. Once a feature/** branch merges, that same tree already ran
  # here — re-running on push to development/main (which auto-pr.yml/
  # promote.yml would otherwise trigger for) would just be redundant compute
  # against a commit that's either an unchanged merge or the promotion PR's
  # tree (also unchanged from what development already tested).
  push:
    branches: ["feature/**"]
  pull_request:
    branches: [development]

permissions: {}

jobs:
  test:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test
