name: Tests

on:
  # pull_request only, no push trigger — auto-pr.yml auto-opens a PR within
  # seconds of the first push to any feature/** branch, so a push-triggered
  # run would almost always just duplicate the pull_request-triggered run
  # for the same commit (and unconditionally would, on every push after the
  # first). This is what the development branch ruleset actually requires;
  # a merge into development/main doesn't re-trigger this at all, since
  # that tree already ran here as the PR's head commit.
  pull_request:
    branches: [development]

permissions: {}

jobs:
  test:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test
