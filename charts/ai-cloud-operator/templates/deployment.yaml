apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-cloud-operator.fullname" . }}-controller-manager
  labels:
    control-plane: controller-manager
  {{- include "ai-cloud-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-cloud-operator
      control-plane: controller-manager
    {{- include "ai-cloud-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-cloud-operator
        control-plane: controller-manager
      {{- include "ai-cloud-operator.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
        # Deployment-shaped env values (CONVEX_BASE_URL/OPERATOR_NAME/
        # OPERATOR_EXTERNAL_URL, and ENROLLMENT_SECRET when chart-managed)
        # only take effect on process start, unlike ENROLLMENT_SECRET
        # rotations picked up by internal/convexclient's
        # EnrollmentSecretWatcher poll loop when it lives in a Secret this
        # chart doesn't own. Checksums here force a rollout on `helm
        # upgrade` whenever the chart-owned copies actually change, the
        # same job kustomize's configMapGenerator hash-suffix trick did.
        checksum/params: {{ include (print $.Template.BasePath "/params.yaml") . | sha256sum }}
        {{- if not .Values.enrollmentSecret.existingSecretName }}
        checksum/enrollment-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      containers:
      - args: {{- toYaml .Values.controllerManager.manager.args | nindent 8 }}
        command:
        - /manager
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: API_LISTEN_ADDR
          value: {{ quote .Values.controllerManager.manager.env.apiListenAddr }}
        - name: CONVEX_BASE_URL
          valueFrom:
            configMapKeyRef:
              key: CONVEX_BASE_URL
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        - name: OPERATOR_NAME
          valueFrom:
            configMapKeyRef:
              key: OPERATOR_NAME
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        - name: OPERATOR_EXTERNAL_URL
          valueFrom:
            configMapKeyRef:
              key: OPERATOR_EXTERNAL_URL
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        - name: WORKLOAD_NAMESPACE
          valueFrom:
            configMapKeyRef:
              key: WORKLOAD_NAMESPACE
              name: {{ include "ai-cloud-operator.fullname" . }}-params
        - name: ENROLLMENT_SECRET
          valueFrom:
            secretKeyRef:
              {{- if .Values.enrollmentSecret.existingSecretName }}
              name: {{ .Values.enrollmentSecret.existingSecretName }}
              key: {{ .Values.enrollmentSecret.existingSecretKey }}
              {{- else }}
              name: {{ include "ai-cloud-operator.fullname" . }}-enrollment-secret
              key: ENROLLMENT_SECRET
              {{- end }}
        # GATEWAY_SIGNING_SECRET is deliberately absent — the operator
        # generates and persists its own on first boot instead of asking
        # this chart to mint and hand it one (see internal/gateway.KeyStore
        # and docs/production-deploy.md).
        image: {{ .Values.controllerManager.manager.image.repository }}:{{ .Values.controllerManager.manager.image.tag
          | default .Chart.AppVersion }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 9443
          name: operator-api
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.controllerManager.manager.resources | nindent 10
          }}
        securityContext: {{- toYaml .Values.controllerManager.manager.containerSecurityContext
          | nindent 10 }}
      nodeSelector: {{- toYaml .Values.controllerManager.nodeSelector | nindent 8 }}
      securityContext: {{- toYaml .Values.controllerManager.podSecurityContext | nindent
        8 }}
      serviceAccountName: {{ include "ai-cloud-operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      tolerations: {{- toYaml .Values.controllerManager.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.controllerManager.topologySpreadConstraints
        | nindent 8 }}
